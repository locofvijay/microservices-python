apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customer-api-ingress
  namespace: customer
spec:
  rules:
    - host: customer-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-api
                port:
                  number: 80