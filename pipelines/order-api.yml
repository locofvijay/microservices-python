trigger:
  branches:
    include:
      - main
  paths:
    include:
      - order_api/*
      - k8s/order-api/*

pool:
  vmImage: ubuntu-latest

variables:
  acrServiceConnection: 'sc-acr'
  aksServiceConnection: 'sc-aks'
  acrLoginServer: 'myacr.azurecr.io'
  imageRepository: 'order-api'
  imageTag: '$(Build.BuildId)'
  namespace: 'order'
  manifestPath: 'k8s/order-api'

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildAndPush
    steps:
    - task: Docker@2
      displayName: Build and push order-api
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: order_api/Dockerfile
        containerRegistry: $(acrServiceConnection)
        tags: |
          $(imageTag)
          latest

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - deployment: DeployOrderApi
    displayName: Deploy order-api
    environment: aks-dev
    strategy:
      runOnce:
        deploy:
          steps:
          - task: KubernetesManifest@1
            displayName: Deploy manifests
            inputs:
              action: deploy
              kubernetesServiceConnection: $(aksServiceConnection)
              namespace: $(namespace)
              manifests: |
                $(manifestPath)/configmap.yaml
                $(manifestPath)/deployment.yaml
                $(manifestPath)/service.yaml
                $(manifestPath)/ingress.yaml
              containers: |
                $(acrLoginServer)/$(imageRepository):$(imageTag)